<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linux 英语单词刷题</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        #app {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 28px 30px 40px;
            margin: 0 auto;
            transition: all 0.2s;
        }
        @media (max-width: 600px) {
            #app {
                padding: 16px 14px 30px;
                border-radius: 20px;
            }
            body {
                padding: 12px;
            }
        }

        /* ===== 头部 ===== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 2px solid #e9edf2;
        }
        .app-header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(145deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .app-header .badge {
            background: #e9edf2;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
        }

        /* ===== 卡片 & 通用 ===== */
        .card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 20px;
            border: 1px solid #e9edf2;
        }
        .card-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 14px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== 设置区域 ===== */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 24px;
        }
        @media (max-width: 480px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .setting-item label {
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            letter-spacing: 0.2px;
        }
        .setting-item select,
        .setting-item input {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1.5px solid #dce1e8;
            background: #ffffff;
            font-size: 15px;
            color: #0f172a;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
            width: 100%;
        }
        .setting-item select:focus,
        .setting-item input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .setting-item select {
            appearance: auto;
            cursor: pointer;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .mode-toggle button {
            flex: 1;
            min-width: 100px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 2px solid #dce1e8;
            background: #fff;
            font-weight: 600;
            font-size: 14px;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-toggle button.active {
            border-color: #6366f1;
            background: #eef2ff;
            color: #4f46e5;
        }
        .mode-toggle button:hover:not(.active) {
            border-color: #b8c0cc;
            background: #f1f5f9;
        }

        /* ===== 按钮 ===== */
        .btn-primary {
            background: #4f46e5;
            border: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 17px;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        }
        .btn-primary:hover {
            background: #4338ca;
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: #e9edf2;
            border: none;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 14px;
            color: #1e293b;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-secondary:hover {
            background: #dce1e8;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #dce1e8;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 14px;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-outline:hover {
            border-color: #6366f1;
            color: #4f46e5;
            background: #f8faff;
        }
        .btn-danger-outline {
            background: transparent;
            border: 2px solid #fca5a5;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 14px;
            color: #b91c1c;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger-outline:hover {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .action-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .action-row .btn-secondary,
        .action-row .btn-outline,
        .action-row .btn-danger-outline {
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        /* ===== 答题界面 ===== */
        .progress-bar-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 14px;
            color: #64748b;
        }
        .progress-track {
            flex: 1;
            height: 6px;
            background: #e2e8f0;
            border-radius: 12px;
            margin: 0 16px;
            overflow: hidden;
        }
        .progress-track .fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 12px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .question-area {
            padding: 12px 0 8px;
        }
        .question-type-badge {
            font-size: 12px;
            font-weight: 600;
            color: #6366f1;
            background: #eef2ff;
            padding: 4px 14px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 12px;
        }
        .question-text {
            font-size: 22px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .question-text .highlight-word {
            color: #4f46e5;
            background: #eef2ff;
            padding: 2px 12px;
            border-radius: 8px;
            font-weight: 700;
        }
        .question-example {
            font-size: 14px;
            color: #64748b;
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #6366f1;
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 480px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
        .option-btn {
            padding: 14px 16px;
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            background: #fff;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .option-btn:hover:not(.disabled) {
            border-color: #a5b4fc;
            background: #f8faff;
            transform: translateY(-1px);
        }
        .option-btn .letter {
            display: inline-flex;
            width: 28px;
            height: 28px;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border-radius: 50%;
            font-weight: 700;
            font-size: 13px;
            color: #475569;
            flex-shrink: 0;
        }
        .option-btn.correct {
            border-color: #22c55e;
            background: #f0fdf4;
        }
        .option-btn.correct .letter {
            background: #22c55e;
            color: #fff;
        }
        .option-btn.wrong {
            border-color: #ef4444;
            background: #fef2f2;
        }
        .option-btn.wrong .letter {
            background: #ef4444;
            color: #fff;
        }
        .option-btn.disabled {
            cursor: default;
            opacity: 0.7;
        }
        .option-btn.disabled:hover {
            transform: none;
        }
        .option-btn.show-correct {
            border-color: #22c55e;
            background: #f0fdf4;
        }
        .option-btn.show-correct .letter {
            background: #22c55e;
            color: #fff;
        }

        .answer-feedback {
            margin-top: 18px;
            padding: 14px 18px;
            border-radius: 14px;
            font-weight: 500;
            display: none;
        }
        .answer-feedback.show {
            display: block;
        }
        .answer-feedback.correct {
            background: #f0fdf4;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }
        .answer-feedback.wrong {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .next-btn-wrap {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }
        .next-btn-wrap .btn-primary {
            width: auto;
            padding: 12px 40px;
            font-size: 15px;
        }

        /* ===== 结果页 ===== */
        .result-summary {
            text-align: center;
            padding: 20px 0;
        }
        .result-summary .score {
            font-size: 56px;
            font-weight: 800;
            color: #4f46e5;
            line-height: 1;
        }
        .result-summary .score-label {
            font-size: 16px;
            color: #64748b;
            margin-top: 4px;
        }
        .result-detail {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }
        @media (max-width: 480px) {
            .result-detail {
                grid-template-columns: 1fr 1fr;
            }
        }
        .result-detail .stat {
            background: #f1f5f9;
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }
        .result-detail .stat .num {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
        }
        .result-detail .stat .label {
            font-size: 13px;
            color: #64748b;
        }

        .wrong-list {
            margin-top: 16px;
        }
        .wrong-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #fef2f2;
            border-radius: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #ef4444;
            flex-wrap: wrap;
            gap: 6px;
        }
        .wrong-item .word {
            font-weight: 600;
            font-size: 16px;
        }
        .wrong-item .meaning {
            color: #475569;
            font-size: 14px;
        }
        .wrong-item .chapter-tag {
            font-size: 12px;
            color: #94a3b8;
            background: #f1f5f9;
            padding: 2px 10px;
            border-radius: 20px;
        }

        /* ===== 错题集页 ===== */
        .error-collection {
            margin-top: 6px;
        }
        .error-collection .empty-state {
            text-align: center;
            color: #94a3b8;
            padding: 40px 0;
            font-size: 15px;
        }
        .error-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #f8fafc;
            border-radius: 14px;
            margin-bottom: 10px;
            border: 1px solid #e9edf2;
            flex-wrap: wrap;
            gap: 8px;
        }
        .error-item .word-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .error-item .word-info .word {
            font-weight: 600;
            font-size: 17px;
        }
        .error-item .word-info .meaning {
            color: #475569;
        }
        .error-item .word-info .chapter {
            font-size: 12px;
            color: #94a3b8;
            background: #f1f5f9;
            padding: 2px 12px;
            border-radius: 20px;
        }
        .error-item .remove-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .error-item .remove-btn:hover {
            color: #ef4444;
            background: #fef2f2;
        }

        /* ===== 深渊模式 ===== */
        .abyss-badge {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 12px;
        }

        /* ===== 通用工具 ===== */
        .hidden {
            display: none !important;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .mt-12 {
            margin-top: 12px;
        }
        .mt-20 {
            margin-top: 20px;
        }
        .gap-8 {
            gap: 8px;
        }
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: #94a3b8;
            font-size: 14px;
        }

        /* ===== 响应式微调 ===== */
        @media (max-width: 480px) {
            .question-text {
                font-size: 18px;
            }
            .option-btn {
                font-size: 14px;
                padding: 12px 14px;
            }
            .result-summary .score {
                font-size: 42px;
            }
            .settings-grid {
                gap: 12px;
            }
        }

        /* ===== 等级系统 ===== */
        .player-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .level-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            height: 44px;
            padding: 0 12px;
            border-radius: 22px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.35);
            flex-shrink: 0;
        }
        .xp-bar-wrap {
            flex: 1;
            min-width: 120px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .xp-bar-track {
            flex: 1;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .xp-bar-label {
            font-size: 11px;
            color: #94a3b8;
            white-space: nowrap;
            font-weight: 500;
        }
        .streak-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fef3c7;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #d97706;
            animation: pulse-streak 1.5s ease-in-out infinite;
        }
        .streak-indicator.hot {
            background: #fee2e2;
            color: #dc2626;
            animation: pulse-hot 0.6s ease-in-out infinite;
        }
        @keyframes pulse-streak {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }
        @keyframes pulse-hot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        /* ===== XP 浮动动画 ===== */
        .xp-popup {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 18px;
            color: #f59e0b;
            z-index: 999;
            animation: xp-float 1.6s ease-out forwards;
            text-shadow: 0 1px 4px rgba(245, 158, 11, 0.3);
        }
        @keyframes xp-float {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            50%  { opacity: 1; transform: translateY(-30px) scale(1.25); }
            100% { opacity: 0; transform: translateY(-70px) scale(1); }
        }

        /* ===== 闯关塔面板 ===== */
        .tower-overview {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .tower-stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            padding: 14px 18px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid #e9edf2;
        }
        .tower-stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .tower-stat-item .tstat-num {
            font-size: 22px;
            font-weight: 700;
            color: #4f46e5;
        }
        .tower-stat-item .tstat-label {
            font-size: 12px;
            color: #94a3b8;
        }
        .tower-floor-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        @media (max-width: 768px) {
            .tower-floor-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 480px) {
            .tower-floor-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
        }
        .tower-floor-card {
            background: #f8fafc;
            border: 2px solid #e9edf2;
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            cursor: default;
        }
        .tower-floor-card.cleared {
            border-color: #22c55e;
            background: #f0fdf4;
        }
        .tower-floor-card.current {
            border-color: #6366f1;
            background: #eef2ff;
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.25);
            animation: tower-pulse 2s ease-in-out infinite;
        }
        .tower-floor-card.locked {
            border-color: #e2e8f0;
            background: #f1f5f9;
            opacity: 0.55;
        }
        .tower-floor-card.boss {
            border-style: dashed;
        }
        .tower-floor-card.boss::after {
            content: '👑';
            position: absolute;
            top: -10px;
            right: -4px;
            font-size: 18px;
        }
        @keyframes tower-pulse {
            0%, 100% { box-shadow: 0 0 12px rgba(99, 102, 241, 0.2); }
            50% { box-shadow: 0 0 28px rgba(99, 102, 241, 0.45); }
        }
        .tower-floor-card .floor-num {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
        }
        .tower-floor-card.cleared .floor-num { color: #16a34a; }
        .tower-floor-card.current .floor-num { color: #4f46e5; }
        .tower-floor-card.locked .floor-num { color: #cbd5e1; }
        .tower-floor-card .floor-label {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 2px;
        }
        .tower-floor-card .floor-icon {
            font-size: 20px;
            margin-top: 4px;
        }

        /* ===== 等级提升弹窗 ===== */
        .level-up-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fade-in 0.3s ease;
        }
        .level-up-dialog {
            background: #fff;
            border-radius: 24px;
            padding: 32px 36px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 360px;
            width: 90%;
        }
        .level-up-dialog .lu-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        .level-up-dialog .lu-title {
            font-size: 24px;
            font-weight: 800;
            color: #f59e0b;
            margin-bottom: 4px;
        }
        .level-up-dialog .lu-level {
            font-size: 48px;
            font-weight: 900;
            color: #0f172a;
            margin: 8px 0;
        }
        .level-up-dialog .lu-btn {
            margin-top: 16px;
            padding: 12px 36px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .level-up-dialog .lu-btn:active { transform: scale(0.95); }
        @keyframes fade-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes pop-in {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        /* ===== 塔通关弹窗 ===== */
        .tower-clear-overlay {
            position: fixed;
            inset: 0;

<body>

    <div id="app">
        <!-- 头部 -->

            </div>
        </div>

        <div id="settingsPanel">
            <div class="card">
                <div class="card-title">⚙️ 刷题设置</div>

                    <div class="setting-item">
                        <label>起始章节</label>
                        <select id="chapterStart"></select>
                    </div>
                    <div class="setting-item">
                        <label>结束章节</label>
                        <select id="chapterEnd"></select>
                    </div>
                    <div class="setting-item">
                        <label>题目数量</label>
                        <input type="number" id="questionCount" value="10" min="1" max="500" />
                    </div>
                    <div class="setting-item">
                        <label>题目类型</label>
                        <div class="mode-toggle">
                            <button id="modeWord2Meaning" class="active">单词 → 释义</button>
                            <button id="modeMeaning2Word">释义 → 单词</button>
                            <button id="modeMixed">🔀 混合模式</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-row">
                <button class="btn-primary" id="btnStartQuiz">🚀 开始刷题</button>
                <button class="btn-outline" id="btnAbyssMode">🌀 深渊模式</button>
                <button class="btn-outline" id="btnTowerMode">🗼 闯关塔</button>

                </div>

                    <div class="answer-feedback" id="answerFeedback"></div>

                </div>
            </div>

            </div>
        </div>

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function pickRandom(arr, n) {
            const shuffled = shuffle([...arr]);
            return shuffled.slice(0, n);
        }

        function getChapterList() {
            const chapters = [];
            const map = new Map();
            APP.allWords.forEach(w => {
                const key = w.chapterIndex + ':' + w.chapter;
                if (!map.has(key)) {
                    map.set(key, { index: w.chapterIndex, name: w.chapter });
                }
            });
            const sorted = Array.from(map.values()).sort((a, b) => a.index - b.index);
            return sorted;
        }

        // 计算升到下一级所需总经验
        function xpForLevel(level) {
            let total = 0;
            for (let l = 1; l < level; l++) {
                total += l * 80;
            }
            return total;
        }

        // 根据总经验计算等级
        function calcLevel(totalXP) {
            let level = 1;
            let acc = 0;
            while (true) {
                const need = level * 80;
                if (acc + need > totalXP) break;
                acc += need;
                level++;
                if (level > 50) break;
            }
            return { level, xpIntoLevel: totalXP - acc, xpForNext: level * 80 };
        }

        // 刷新界面的等级展示
        function refreshLevelUI() {
            const pd = APP.playerData;
            const info = calcLevel(pd.xp);
            levelBadge.textContent = `Lv.${info.level}`;
            const pct = Math.min(100, Math.round((info.xpIntoLevel / info.xpForNext) * 100));
            xpBarFill.style.width = pct + '%';
            xpBarLabel.textContent = `${info.xpIntoLevel} / ${info.xpForNext} XP`;
        }

            const pd = APP.playerData;
            let xp = getXPPerQuestion();
            // 连对加成
            pd.streak++;
            if (pd.streak > pd.streakBest) pd.streakBest = pd.streak;
            if (pd.streak >= 3) {
                xp += (pd.streak - 2) * 3;
            }
            const oldLevel = calcLevel(pd.xp).level;
            pd.xp += xp;
            pd.sessionXP += xp;
            const newInfo = calcLevel(pd.xp);
            savePlayerData();
            refreshLevelUI();

            // 升级弹窗
            if (newInfo.level > oldLevel) {
                setTimeout(() => showLevelUpDialog(newInfo.level), 400);
            }

            return xp;
        }

        // ============================================================
        //  7. 核 心 逻 辑  —  生 成 题 目
        // ============================================================

        /**
         * 为一道题选取干扰项
         * @param {Object} targetWord - 当前考察的单词对象
         * @param {string} actualMode - 'word2meaning' | 'meaning2word'
         * @param {number} need - 需要几个干扰项（默认 3）
         * @returns {string[]} 去重后的干扰项列表
         */
        function pickDistractors(targetWord, actualMode, need = 3) {
            const usedValues = new Set();
            // 正确答案本身不能当干扰项
            const correctValue = actualMode === 'word2meaning' ? targetWord.meaning : targetWord.word;
            usedValues.add(correctValue);

            // 三层候选项，按优先级拼接
            const sameChapter = [];
            const diffChapter = [];
            const lastResort = [];

            for (const w of APP.allWords) {
                if (w.word === targetWord.word) continue;                        // 跳过自己
                if (actualMode === 'meaning2word' && w.meaning === targetWord.meaning) continue; // 同义词不混入
                if (actualMode === 'word2meaning' && w.meaning === targetWord.meaning) continue;  // 同释义不混入

                const value = actualMode === 'word2meaning' ? w.meaning : w.word;
                if (usedValues.has(value)) continue;                            // 已用过，跳过
                if (!value || value.trim() === '') continue;                   // 空值跳过

                if (w.chapterIndex === targetWord.chapterIndex) {
                    sameChapter.push({ value, word: w.word });
                } else {
                    diffChapter.push({ value, word: w.word });
                }
                // lastResort: 当同释义词不够时，允许任何不同词（但滤掉已用的值）
                if (w.meaning !== targetWord.meaning && !usedValues.has(value)) {
                    lastResort.push({ value, word: w.word });
                }
            }

            // 按优先级拼接：同章 → 跨章 → 兜底
            const candidates = [
                ...shuffle(sameChapter),
                ...shuffle(diffChapter),
                ...shuffle(lastResort),
            ];

            // 严格去重选取
            const picked = [];
            for (const c of candidates) {
                if (usedValues.has(c.value)) continue;
                picked.push(c.value);
                usedValues.add(c.value);
                if (picked.length >= need) break;
            }

            return picked;
        }

        /**
         * 从词库中生成 count 道题。
         * 当 count > pool.length 时，自动多轮循环抽取 ——
         * 每轮将词库打乱后逐个使用，同一单词在不同轮次会生成不同的干扰项。
         * @param {Object[]} pool  - 候选词库
         * @param {number}   count - 需要的题数
         * @param {string}   mode  - 'word2meaning' | 'meaning2word' | 'mixed'
         * @returns {Object[]} 题目数组
         */
        function generateQuestions(pool, count, mode) {
            const MAX_QUESTIONS = 500;
            const actualCount = Math.min(count, MAX_QUESTIONS);
            const questions = [];
            let poolIndex = 0;
            let shuffledPool = [];

            // 构建单道题
            function buildQuestion(word, actualMode) {
                const wrongs = pickDistractors(word, actualMode, 3);
                if (actualMode === 'word2meaning') {
                    return {
                        word: word,
                        questionText: `请选择 "${word.word}" 的正确释义`,
                        correctAnswer: word.meaning,
                        options: shuffle([word.meaning, ...wrongs]),
                        type: 'word2meaning',
                        displayWord: word.word,
                        displayMeaning: word.meaning,
                        example: word.example || '',
                    };
                } else {
                    return {
                        word: word,
                        questionText: `请选择 "${word.meaning}" 对应的单词`,
                        correctAnswer: word.word,
                        options: shuffle([word.word, ...wrongs]),
                        type: 'meaning2word',
                        displayWord: word.word,
                        displayMeaning: word.meaning,
                        example: word.example || '',
                    };
                }
            }

            while (questions.length < actualCount) {
                // 每轮重新洗牌，保证每轮内单词不重复，但跨轮可复用
                if (poolIndex === 0) {
                    shuffledPool = shuffle([...pool]);
                }

                const word = shuffledPool[poolIndex];
                let actualMode = mode;
                if (mode === 'mixed') {
                    actualMode = Math.random() < 0.5 ? 'word2meaning' : 'meaning2word';
                }

                questions.push(buildQuestion(word, actualMode));

                poolIndex++;
                if (poolIndex >= shuffledPool.length) {
                    poolIndex = 0; // 本轮用完，下轮重新洗牌
                }
            }

            return questions;
        }

                return;

            let count = parseInt(questionCount.value) || 10;
            if (count < 1) count = 1;
            if (count > pool.length) {
                // 不限制 — generateQuestions 会自动多轮循环复用单词，每轮干扰项重新随机
                console.log(`题目数量(${count})超出词库(${pool.length})，将循环复用单词并随机生成不同干扰项。`);
            }

            APP.pool = pool;
            APP.questions = generateQuestions(pool, count, APP.mode);
            APP.currentIndex = 0;
            APP.correctCount = 0;
            APP.wrongCount = 0;
            APP.wrongList = [];
            APP.abyssMode = false;
            APP.errorReviewMode = false;
            APP.towerMode = false;

        // ============================================================
        //  11. 渲 染 题 目
        // ============================================================
        function renderQuestion() {
            const qs = APP.questions;
            if (APP.currentIndex >= qs.length) {
                showResult();
                return;
            }
            const q = qs[APP.currentIndex];
            const total = qs.length;
            const idx = APP.currentIndex + 1;

            progressText.textContent = `${idx} / ${total}`;
            progressFill.style.width = `${(idx / total) * 100}%`;
            scoreDisplay.textContent = `✅ ${APP.correctCount}`;

            // 题型标签
            if (q.type === 'word2meaning') {
                qTypeBadge.textContent = '📝 单词 → 释义';
            } else {
                qTypeBadge.textContent = '📝 释义 → 单词';
            }

            // 更新连对和等级显示
            const pd = APP.playerData;
            const lvlInfo = calcLevel(pd.xp);
            const streakHTML = getStreakHTML();
            let modeLabel = '';
            if (APP.towerMode) modeLabel = `🗼 闯关塔 第${APP.towerCurrentFloor}层 · Lv.${lvlInfo.level}`;
            else if (APP.abyssMode) modeLabel = '🌀 深渊模式 · 全范围随机 · 混合题型';
            else if (APP.errorReviewMode) modeLabel = '📖 错题重刷模式';
            else modeLabel = '📘 普通模式';
            quizModeLabel.innerHTML = modeLabel + ' · ' + (streakHTML || `Lv.${lvlInfo.level}`);

            // 题目文字
            qText.innerHTML = q.questionText.replace(/\n/g, '<br>');

            // 示例
            if (q.example) {
                qExample.textContent = `📖 用例：${q.example}`;
                qExample.style.display = 'block';
            } else {
                qExample.style.display = 'none';
            }

            // 选项
            const letters = ['A', 'B', 'C', 'D'];
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="letter">${letters[i]}</span> ${opt}`;
                btn.dataset.value = opt;
                btn.addEventListener('click', () => handleOptionClick(btn, q));
                optionsContainer.appendChild(btn);
            });

            // 重置反馈
            answerFeedback.classList.remove('show', 'correct', 'wrong');
            answerFeedback.textContent = '';
            APP.answered = false;
            btnNext.textContent = APP.currentIndex === qs.length - 1 ? '📊 查看结果' : '下一题 →';
            btnNext.disabled = true;
            btnNext.style.opacity = '0.6';
            btnNext.style.cursor = 'default';
        }

        // ============================================================
        //  12. 选 项 点 击
        // ============================================================
        function handleOptionClick(btn, q) {
            if (APP.answered) return;
            APP.answered = true;

            const selected = btn.dataset.value;
            const correct = q.correctAnswer;
            const isCorrect = selected === correct;

            // 禁用所有选项
            document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));

            // 标记正确和错误
            document.querySelectorAll('.option-btn').forEach(b => {
                if (b.dataset.value === correct) {
                    b.classList.add('correct');
                }
                if (b === btn && !isCorrect) {
                    b.classList.add('wrong');
                }
            });

            // 显示反馈
            answerFeedback.classList.add('show');
            if (isCorrect) {
                const xpGained = grantXP();
                answerFeedback.className = 'answer-feedback show correct';
                answerFeedback.textContent = `✅ 回答正确！ +${xpGained} XP`;
                APP.correctCount++;
                // XP 浮动动画
                spawnXPPopup(xpGained, btn);
                // 如果是在错题重刷模式，做对了就从错题集移除
                if (APP.errorReviewMode) {
                    removeError(q.word);
                }
            } else {
                resetStreak();
                answerFeedback.className = 'answer-feedback show wrong';
                answerFeedback.textContent = `❌ 回答错误。正确答案是：${correct}`;
                APP.wrongCount++;
                APP.wrongList.push(q.word);
                // 加入错题集
                addError(q.word);
            }

            // 更新连对显示
            const streakHTML = getStreakHTML();
            const lvlInfo = calcLevel(APP.playerData.xp);
            let modeLabel = '';
            if (APP.towerMode) modeLabel = `🗼 闯关塔 第${APP.towerCurrentFloor}层 · Lv.${lvlInfo.level}`;
            else if (APP.abyssMode) modeLabel = '🌀 深渊模式 · 全范围随机 · 混合题型';
            else if (APP.errorReviewMode) modeLabel = '📖 错题重刷模式';
            else modeLabel = '📘 普通模式';
            quizModeLabel.innerHTML = modeLabel + ' · ' + (streakHTML || `Lv.${lvlInfo.level}`);

            // 更新得分显示
            scoreDisplay.textContent = `✅ ${APP.correctCount}`;

            // 启用下一题
            btnNext.disabled = false;
            btnNext.style.opacity = '1';
            btnNext.style.cursor = 'pointer';
        }

        // ============================================================
        //  13. 下 一 题（包含塔模式分支，定义见 15.5 节）
        // ============================================================

        // ============================================================
        //  14. 显 示 结 果

            finalScore.textContent = `${correct} / ${total}`;

                APP.wrongList.forEach(w => {
                    const div = document.createElement('div');

                    div.innerHTML = `

                        <span class="meaning">${w.meaning}</span>

        // ============================================================
        //  15.5 闯 关 塔 模 式
        // ============================================================

        // 塔配置
        const TOWER_CONFIG = {
            totalFloors: 10,
            questionsPerFloor: 5,
            passThreshold: 4,     // 每层至少答对 4 题才能通过
            bossFloors: [3, 6, 9, 10],  // Boss 层（全章节 + 混合模式）
        };

        // 判断是否为 Boss 层
        function isBossFloor(floor) {
            return TOWER_CONFIG.bossFloors.includes(floor);
        }

        // 渲染塔模式主面板
        function showTowerPanel() {
            showPanel('tower');
            renderTowerFloors();
        }

        function renderTowerFloors() {
            const highestCleared = APP.playerData.towerFloor;
            towerHighestFloor.textContent = highestCleared;
            towerTotalXP.textContent = APP.playerData.xp;

            // 当前挑战目标：下一层未通关的
            const targetFloor = Math.min(highestCleared + 1, TOWER_CONFIG.totalFloors);
            towerTargetFloor.textContent = targetFloor;

            towerFloorGrid.innerHTML = '';
            for (let f = 1; f <= TOWER_CONFIG.totalFloors; f++) {
                const card = document.createElement('div');
                card.className = 'tower-floor-card';

                let status = 'locked';
                let icon = '🔒';
                if (f <= highestCleared) {
                    status = 'cleared';
                    icon = '✅';
                } else if (f === targetFloor) {
                    status = 'current';
                    icon = '⚔️';
                }
                if (isBossFloor(f)) {
                    card.classList.add('boss');
                    if (status === 'locked') icon = '👑🔒';
                    else if (status === 'cleared') icon = '👑✅';
                    else icon = '👑⚔️';
                }
                card.classList.add(status);

                card.innerHTML = `
                    <div class="floor-num">${f}</div>
                    <div class="floor-label">第${f}层${isBossFloor(f) ? ' 👑BOSS' : ''}</div>
                    <div class="floor-icon">${icon}</div>
                `;
                towerFloorGrid.appendChild(card);
            }
        }

        // 开始塔层挑战
        function startTowerChallenge() {
            const highestCleared = APP.playerData.towerFloor;
            const floor = Math.min(highestCleared + 1, TOWER_CONFIG.totalFloors);
            APP.towerCurrentFloor = floor;
            APP.towerMode = true;
            APP.abyssMode = false;
            APP.errorReviewMode = false;

            // Boss 层使用全章节 + 混合模式，普通层使用当前设置
            let pool, mode;
            if (isBossFloor(floor)) {
                pool = APP.allWords;
                mode = 'mixed';
            } else {
                const range = getChapterRange();
                pool = filterWordsByChapter(range.start, range.end);
                mode = 'mixed';
            }

            if (pool.length < TOWER_CONFIG.questionsPerFloor) {
                pool = APP.allWords;
            }

            APP.pool = pool;
            APP.questions = generateQuestions(pool, TOWER_CONFIG.questionsPerFloor, mode);
            APP.currentIndex = 0;
            APP.correctCount = 0;
            APP.wrongCount = 0;
            APP.wrongList = [];
            APP.answered = false;
            APP.playerData.streak = 0;
            APP.playerData.sessionXP = 0;

            showPanel('quiz');
            const bossLabel = isBossFloor(floor) ? ' 👑BOSS层' : '';
            quizModeLabel.textContent = `🗼 闯关塔 第${floor}层${bossLabel} · Lv.${calcLevel(APP.playerData.xp).level}`;
            renderQuestion();
        }

        // 塔层结果（复用 quiz 的 nextQuestion → showResult 流程，但塔模式需要特殊处理）
        // 重写 showResult 对于塔模式的行为
        function nextQuestion() {
            if (btnNext.disabled) return;
            APP.currentIndex++;
            if (APP.currentIndex >= APP.questions.length) {
                if (APP.towerMode) {
                    showTowerFloorResult();
                } else {
                    showResult();
                }
            } else {
                renderQuestion();
            }
        }

        // 展示塔层结果
        function showTowerFloorResult() {
            const total = APP.questions.length;
            const correct = APP.correctCount;
            const floor = APP.towerCurrentFloor;
            const passed = correct >= TOWER_CONFIG.passThreshold;

            if (passed) {
                // 通关楼层
                const oldHighest = APP.playerData.towerFloor;
                if (floor > oldHighest) {
                    APP.playerData.towerFloor = floor;
                }
                // 楼层通关经验
                const floorBonus = floor * 20;
                APP.playerData.xp += floorBonus;
                APP.playerData.sessionXP += floorBonus;
                const oldLevel = calcLevel(APP.playerData.xp - floorBonus).level;
                const newLevel = calcLevel(APP.playerData.xp).level;
                savePlayerData();
                refreshLevelUI();

                trIcon.textContent = '🏆';
                trTitle.textContent = `第 ${floor} 层 通过！`;
                trDetail.textContent = `正确 ${correct}/${total} · ${correct >= total ? '完美通关！🌟' : '勉强通过'} `;
                trXP.textContent = `+${floorBonus} XP（楼层奖励）`;
                btnTowerContinue.style.display = '';
                btnTowerContinue.textContent = floor >= TOWER_CONFIG.totalFloors ? '🏆 查看终极结算' : '▶ 继续下一层';
                btnTowerQuit.textContent = '🏠 退出';
                btnTowerQuit.onclick = goHome;

                // 全部通关
                if (floor >= TOWER_CONFIG.totalFloors) {
                    // 全通奖励
                    const clearBonus = 200;
                    APP.playerData.xp += clearBonus;
                    APP.playerData.sessionXP += clearBonus;
                    savePlayerData();
                    refreshLevelUI();
                    trXP.textContent = `+${floorBonus + clearBonus} XP（楼层${floorBonus} + 全通${clearBonus}）`;
                    btnTowerContinue.textContent = '🎉 领取终极奖励';
                }

                // 升级弹窗
                if (newLevel > oldLevel) {
                    setTimeout(() => showLevelUpDialog(newLevel), 400);
                }
            } else {
                // 未通过
                trIcon.textContent = '💔';
                trTitle.textContent = `第 ${floor} 层 失败`;
                trDetail.textContent = `正确 ${correct}/${total} · 需要 ${TOWER_CONFIG.passThreshold}/${total} 才能通过`;
                trXP.textContent = '未通过，无奖励';
                btnTowerContinue.style.display = 'none';
                btnTowerQuit.textContent = '🔄 重新挑战';
                // 修改退出按钮行为为重试
                btnTowerQuit.onclick = towerRetryFloor;
            }

            showPanel('towerResult');

            // 全部通关特殊结算 — towerNextFloor 内部会检测并弹出全通界面
            if (passed && floor >= TOWER_CONFIG.totalFloors) {
                // 按钮文本已在上面设置好，towerNextFloor 会处理全通逻辑
            }
        }

        // 继续下一层
        function towerNextFloor() {
            if (APP.playerData.towerFloor >= TOWER_CONFIG.totalFloors) {
                showTowerClearDialog();
                return;
            }
            APP.towerCurrentFloor = APP.playerData.towerFloor + 1;
            startTowerChallengeFromFloor(APP.towerCurrentFloor);
        }

        // 重试当前层
        function towerRetryFloor() {
            startTowerChallengeFromFloor(APP.towerCurrentFloor);
        }

        // 从指定楼层发起挑战
        function startTowerChallengeFromFloor(floor) {
            APP.towerCurrentFloor = floor;
            APP.towerMode = true;
            APP.abyssMode = false;
            APP.errorReviewMode = false;

            let pool;
            if (isBossFloor(floor)) {
                pool = APP.allWords;
            } else {
                const range = getChapterRange();
                pool = filterWordsByChapter(range.start, range.end);
                if (pool.length < TOWER_CONFIG.questionsPerFloor) pool = APP.allWords;
            }

            APP.pool = pool;
            APP.questions = generateQuestions(pool, TOWER_CONFIG.questionsPerFloor, 'mixed');
            APP.currentIndex = 0;
            APP.correctCount = 0;
            APP.wrongCount = 0;
            APP.wrongList = [];
            APP.answered = false;
            APP.playerData.streak = 0;
            APP.playerData.sessionXP = 0;

            showPanel('quiz');
            const bossLabel = isBossFloor(floor) ? ' 👑BOSS层' : '';
            quizModeLabel.textContent = `🗼 闯关塔 第${floor}层${bossLabel} · Lv.${calcLevel(APP.playerData.xp).level}`;
            renderQuestion();
        }

        // 全通关弹窗
        function showTowerClearDialog() {
            const overlay = document.createElement('div');
            overlay.className = 'tower-clear-overlay';
            overlay.innerHTML = `
                <div class="tower-clear-dialog">
                    <div class="tc-icon">👑</div>
                    <div class="tc-title">塔之巅峰！</div>
                    <div class="tc-subtitle">恭喜！你已征服全部 ${TOWER_CONFIG.totalFloors} 层闯关塔！<br>称号：<b>Linux 单词大师</b> 🎖️</div>
                    <p style="font-size:15px;color:#d97706;font-weight:700;">总经验：${APP.playerData.xp} XP · Lv.${calcLevel(APP.playerData.xp).level}</p>
                    <button class="tc-btn" id="tcCloseBtn">👍 太棒了</button>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.querySelector('#tcCloseBtn').addEventListener('click', () => {
                overlay.remove();
                goHome();
            });
            overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove();
                    goHome(); } });
        }

        // 重置塔进度
        function resetTowerProgress() {
            if (confirm('确定要重置闯关塔的全部进度吗？此操作不可撤销！')) {
                APP.playerData.towerFloor = 0;
                savePlayerData();
                renderTowerFloors();
            }
        }

        // ============================================================
        //  16. 启 动
        // ============================================================
        document.addEventListener('DOMContentLoaded', initUI);

        // 修复章节下拉联动
        chapterStart.addEventListener('change', () => {
            const start = parseInt(chapterStart.value);
            const end = parseInt(chapterEnd.value);
            if (start > end) {
                chapterEnd.value = start;
            }
        });
        chapterEnd.addEventListener('change', () => {
            const start = parseInt(chapterStart.value);
            const end = parseInt(chapterEnd.value);
            if (end < start) {
                chapterStart.value = end;
            }
        });

        console.log('📘 Linux 单词刷题应用已加载！题库共 ' + APP.allWords.length + ' 个单词。');
    </script>

</body>
</html>
